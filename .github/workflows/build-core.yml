name: Reusable Marble Kernel Build

on:
  workflow_call:
    outputs:
      flash_artifact_name:
        description: Uploaded flash artifact name
        value: ${{ jobs.build.outputs.flash_artifact_name }}
    inputs:
      source_repo:
        required: true
        type: string
      source_ref:
        required: true
        type: string
      manager:
        required: true
        type: string
      manager_ref:
        required: false
        type: string
        default: ""
      enable_susfs:
        required: true
        type: boolean
      susfs_version:
        required: true
        type: string
      susfs_kernel_branch:
        required: true
        type: string
      susfs_ref:
        required: false
        type: string
        default: ""
      susfs_expected_version:
        required: false
        type: string
        default: ""
      build_scope:
        required: true
        type: string
      enable_ccache:
        required: true
        type: boolean
      toolchain:
        required: false
        type: string
        default: android-r416183b
      artifact_label:
        required: true
        type: string
      run_policy_tests:
        required: false
        type: boolean
        default: false
      publish_step_summary:
        required: false
        type: boolean
        default: true

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    permissions:
      contents: read
      id-token: write
      attestations: write
    outputs:
      flash_artifact_name: ${{ steps.artifact-name.outputs.name }}
    env:
      GH_TOKEN: ${{ github.token }}
      SOURCE_REPO: ${{ inputs.source_repo }}
      SOURCE_REF: ${{ inputs.source_ref }}
      MANAGER: ${{ inputs.manager }}
      MANAGER_REF: ${{ inputs.manager_ref }}
      ENABLE_SUSFS: ${{ inputs.enable_susfs }}
      SUSFS_VERSION: ${{ inputs.susfs_version }}
      SUSFS_KERNEL_BRANCH: ${{ inputs.susfs_kernel_branch }}
      SUSFS_REF: ${{ inputs.susfs_ref }}
      SUSFS_EXPECTED_VERSION: ${{ inputs.susfs_expected_version }}
      BUILD_SCOPE: ${{ inputs.build_scope }}
      KERNEL_DIR: kernel-source
      CCACHE_DIR: /home/runner/.ccache
      USE_CCACHE: ${{ inputs.enable_ccache }}
      TOOLCHAIN: ${{ inputs.toolchain }}
      ANDROID_CLANG_BIN: ${{ github.workspace }}/android-clang/clang-r416183b/bin
      LLVM_22_1_8_BIN: ${{ github.workspace }}/llvm-22.1.8/bin

    steps:
      - name: Checkout builder
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Validate builder policy
        if: ${{ inputs.run_policy_tests }}
        run: |
          for test_script in tests/test-*.sh; do
            env -u SOURCE_REPO -u SOURCE_REF -u MANAGER -u MANAGER_REF -u ENABLE_SUSFS \
              -u SUSFS_VERSION -u SUSFS_KERNEL_BRANCH -u SUSFS_REF -u SUSFS_EXPECTED_VERSION \
              bash "${test_script}"
          done

      - name: Validate inputs
        run: bash scripts/validate-inputs.sh

      - name: Checkout kernel source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: ${{ inputs.source_repo }}
          ref: ${{ inputs.source_ref }}
          path: kernel-source
          fetch-depth: 1
          persist-credentials: false

      - name: Check runner disk space
        id: disk-space
        run: |
          available_gib="$(df --output=avail -BG / | tail -n1 | tr -dc '0-9')"
          echo "available_gib=${available_gib}" >> "$GITHUB_OUTPUT"
          if (( available_gib < 20 )); then
            echo "Only ${available_gib} GiB free; removing unused hosted-runner SDKs"
            sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
              /usr/local/share/boost /usr/share/swift || true
          else
            echo "${available_gib} GiB free; SDK cleanup not required"
          fi
          df -h /

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            bc bison build-essential ccache cpio curl flex git jq kmod libelf-dev \
            libncurses-dev libssl-dev lld llvm clang file python3 python-is-python3 \
            rsync unzip zip zstd

      - name: Restore Android kernel clang
        if: ${{ inputs.toolchain == 'android-r416183b' }}
        id: android-clang-cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: android-clang
          key: marble-builder-clang-v3-${{ runner.os }}-${{ runner.arch }}-clang-r416183b-6e3223f

      - name: Fetch pinned Android kernel clang
        if: ${{ inputs.toolchain == 'android-r416183b' }}
        run: |
          source config/marble.env
          if [[ -x "${ANDROID_CLANG_BIN}/clang" ]]; then
            "${ANDROID_CLANG_BIN}/clang" --version
            exit 0
          fi
          toolchain_repo="${RUNNER_TEMP}/android-clang-repo"
          for attempt in 1 2 3; do
            rm -rf "${toolchain_repo}"
            if git clone --filter=blob:none --no-checkout --depth=1 \
              --branch "${ANDROID_CLANG_REF}" "${ANDROID_CLANG_REPO}" "${toolchain_repo}"; then
              break
            fi
            if (( attempt == 3 )); then
              echo "::error::Failed to fetch Android Clang repository after ${attempt} attempts"
              exit 1
            fi
            sleep $((attempt * 10))
          done
          actual_commit="$(git -C "${toolchain_repo}" rev-parse HEAD)"
          if [[ "${actual_commit}" != "${ANDROID_CLANG_REF_COMMIT}" ]]; then
            echo "::error::Android Clang ref moved: expected ${ANDROID_CLANG_REF_COMMIT}, got ${actual_commit}"
            exit 1
          fi
          git -C "${toolchain_repo}" sparse-checkout set "${ANDROID_CLANG_VERSION}"
          git -C "${toolchain_repo}" checkout -q --detach "${actual_commit}"
          mkdir -p android-clang
          rm -rf "android-clang/${ANDROID_CLANG_VERSION}"
          mv "${toolchain_repo}/${ANDROID_CLANG_VERSION}" android-clang/
          rm -rf "${toolchain_repo}"
          test -x "${ANDROID_CLANG_BIN}/clang"
          "${ANDROID_CLANG_BIN}/clang" --version

      - name: Restore LLVM 22.1.8
        if: ${{ inputs.toolchain == 'llvm-22.1.8' }}
        id: llvm-2218-cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: llvm-22.1.8
          key: marble-builder-llvm-v1-${{ runner.os }}-${{ runner.arch }}-22.1.8-df0e1ecf

      - name: Fetch LLVM 22.1.8
        if: ${{ inputs.toolchain == 'llvm-22.1.8' }}
        run: |
          source config/marble.env
          if [[ -x "${LLVM_22_1_8_BIN}/clang" ]]; then
            "${LLVM_22_1_8_BIN}/clang" --version
            exit 0
          fi

          archive="${RUNNER_TEMP}/LLVM-22.1.8-Linux-X64.tar.xz"
          curl --fail --location --retry 3 --retry-delay 10 \
            --output "${archive}" "${LLVM_22_1_8_URL}"
          echo "${LLVM_22_1_8_SHA256}  ${archive}" | sha256sum -c -

          rm -rf llvm-22.1.8
          mkdir -p llvm-22.1.8
          tar -xJf "${archive}" -C llvm-22.1.8 --strip-components=1
          test -x "${LLVM_22_1_8_BIN}/clang"
          "${LLVM_22_1_8_BIN}/clang" --version

      - name: Select active toolchain
        run: |
          source config/marble.env
          case "${TOOLCHAIN}" in
            android-r416183b)
              active_bin="${ANDROID_CLANG_BIN}"
              active_id="${TOOLCHAIN}"
              active_version="${ANDROID_CLANG_VERSION}"
              active_commit="${ANDROID_CLANG_REF_COMMIT}"
              active_digest=""
              ;;
            llvm-22.1.8)
              active_bin="${LLVM_22_1_8_BIN}"
              active_id="${TOOLCHAIN}"
              active_version="LLVM 22.1.8"
              active_commit=""
              active_digest="${LLVM_22_1_8_SHA256}"
              ;;
            *)
              echo "::error::Unsupported toolchain: ${TOOLCHAIN}"
              exit 1
              ;;
          esac
          test -x "${active_bin}/clang"
          {
            echo "ANDROID_CLANG_BIN=${active_bin}"
            echo "ACTIVE_TOOLCHAIN_ID=${active_id}"
            echo "ACTIVE_TOOLCHAIN_VERSION=${active_version}"
            echo "ACTIVE_TOOLCHAIN_COMMIT=${active_commit}"
            echo "ACTIVE_TOOLCHAIN_DIGEST=${active_digest}"
          } >> "${GITHUB_ENV}"
          "${active_bin}/clang" --version

      - name: Resolve refs
        run: bash scripts/resolve-refs.sh

      - name: Generate ccache key
        id: cache-context
        if: ${{ inputs.enable_ccache }}
        run: |
          source config/marble.env
          source release/resolved-refs.env
          config_hash="$(sha256sum scripts/build-kernel.sh config/marble.env config/managers.json \
            config/susfs-refs.json | sha256sum | cut -d' ' -f1)"
          toolchain_id="${ACTIVE_TOOLCHAIN_ID:-${TOOLCHAIN}}"
          prefix="marble-builder-ccache-v2-${RUNNER_OS}-${RUNNER_ARCH}-${toolchain_id}-${source_commit}"
          manager_prefix="${prefix}-${MANAGER}"
          key="${manager_prefix}-${manager_commit:-none}-${susfs_commit:-none}-${BUILD_SCOPE}-${config_hash}"
          {
            echo "key=${key}"
            echo "prefix=${prefix}"
            echo "manager_prefix=${manager_prefix}"
          } >> "$GITHUB_OUTPUT"

      - name: Restore ccache
        id: ccache-restore
        if: ${{ inputs.enable_ccache }}
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ${{ steps.cache-context.outputs.key }}
          restore-keys: |
            ${{ steps.cache-context.outputs.manager_prefix }}-
            ${{ steps.cache-context.outputs.prefix }}-

      - name: Apply manager
        run: bash scripts/patch-manager.sh

      - name: Read manager version
        run: bash scripts/read-manager-version.sh

      - name: Apply SUSFS
        run: bash scripts/apply-susfs.sh

      - name: Build kernel
        run: bash scripts/build-kernel.sh

      - name: Read manager build metadata
        run: bash scripts/read-manager-build-metadata.sh

      - name: Package AnyKernel3 zip
        run: bash scripts/package-anykernel.sh

      - name: Copy metadata into release
        run: |
          cp release/resolved-refs.env kernel-source/release/resolved-refs.env
          {
            echo "source_repo=${SOURCE_REPO}"
            echo "source_ref=${SOURCE_REF}"
            echo "source_commit=$(git -C kernel-source rev-parse HEAD)"
            echo "workflow_run=${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
            echo "runner_image_os=${ImageOS:-unknown}"
            echo "runner_image_version=${ImageVersion:-unknown}"
            echo "android_clang_version=${ACTIVE_TOOLCHAIN_VERSION}"
            echo "android_clang_commit=${ACTIVE_TOOLCHAIN_COMMIT}"
            echo "toolchain=${TOOLCHAIN}"
            echo "toolchain_digest=${ACTIVE_TOOLCHAIN_DIGEST}"
            echo "ccache_key=${{ steps.cache-context.outputs.key }}"
            echo "ccache_hit=${{ steps.ccache-restore.outputs.cache-hit || 'false' }}"
            echo "disk_available_before_build_gib=${{ steps.disk-space.outputs.available_gib }}"
            cat kernel-source/release/resolved-refs.env
          } > kernel-source/release/build-info.txt

      - name: Write build-info JSON
        run: bash scripts/write-build-info-json.sh

      - name: Audit flashable zip
        run: bash scripts/audit-flashable-zip.sh

      - name: Generate build summary
        run: |
          bash scripts/generate-build-summary.sh
          if [[ "${{ inputs.publish_step_summary }}" == "true" ]]; then
            cat kernel-source/release/summary.md >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Set artifact name
        id: artifact-name
        run: echo "name=marble-flash-${{ inputs.artifact_label }}-${BUILD_SCOPE}-r${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"

      - name: Generate artifact attestation
        uses: actions/attest@281a49d4cbb0a72c9575a50d18f6deb515a11deb # v4
        with:
          subject-path: kernel-source/release/*.zip

      - name: Upload flashable artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ steps.artifact-name.outputs.name }}
          if-no-files-found: error
          retention-days: 30
          compression-level: 0
          path: |
            kernel-source/release/*.zip
            kernel-source/release/*.zip.sha256
            kernel-source/release/build-info.txt
            kernel-source/release/build-info.json
            kernel-source/release/summary.md
            kernel-source/release/zip-audit.txt
            kernel-source/release/ccache-stats.txt
            kernel-source/release/zip-name.env

      - name: Save ccache
        if: ${{ inputs.enable_ccache && success() && steps.ccache-restore.outputs.cache-hit != 'true' }}
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ${{ steps.cache-context.outputs.key }}
