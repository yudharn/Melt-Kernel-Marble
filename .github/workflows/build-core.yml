name: Reusable Marble Kernel Build

on:
  workflow_call:
    inputs:
      source_repo:
        required: true
        type: string
      source_ref:
        required: true
        type: string
      manager:
        required: true
        type: string
      manager_ref:
        required: false
        type: string
        default: ""
      enable_susfs:
        required: true
        type: boolean
      susfs_version:
        required: true
        type: string
      susfs_kernel_branch:
        required: true
        type: string
      susfs_ref:
        required: false
        type: string
        default: ""
      susfs_expected_version:
        required: false
        type: string
        default: ""
      build_scope:
        required: true
        type: string
      enable_ccache:
        required: true
        type: boolean
      debug_artifacts:
        required: true
        type: boolean
      make_release:
        required: true
        type: boolean
      artifact_label:
        required: true
        type: string
      run_policy_tests:
        required: false
        type: boolean
        default: false

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    permissions:
      contents: read
    outputs:
      flash_artifact_name: ${{ steps.artifact-name.outputs.name }}
    env:
      GH_TOKEN: ${{ github.token }}
      SOURCE_REPO: ${{ inputs.source_repo }}
      SOURCE_REF: ${{ inputs.source_ref }}
      MANAGER: ${{ inputs.manager }}
      MANAGER_REF: ${{ inputs.manager_ref }}
      ENABLE_SUSFS: ${{ inputs.enable_susfs }}
      SUSFS_VERSION: ${{ inputs.susfs_version }}
      SUSFS_KERNEL_BRANCH: ${{ inputs.susfs_kernel_branch }}
      SUSFS_REF: ${{ inputs.susfs_ref }}
      SUSFS_EXPECTED_VERSION: ${{ inputs.susfs_expected_version }}
      BUILD_SCOPE: ${{ inputs.build_scope }}
      KERNEL_DIR: kernel-source
      CCACHE_DIR: /home/runner/.ccache
      USE_CCACHE: ${{ inputs.enable_ccache }}
      ANDROID_CLANG_BIN: ${{ github.workspace }}/android-clang/clang-r416183b/bin

    steps:
      - name: Checkout builder
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Validate builder policy
        if: ${{ inputs.run_policy_tests }}
        run: |
          for test_script in tests/test-*.sh; do
            env -u SOURCE_REPO -u SOURCE_REF -u MANAGER -u MANAGER_REF -u ENABLE_SUSFS \
              -u SUSFS_VERSION -u SUSFS_KERNEL_BRANCH -u SUSFS_REF -u SUSFS_EXPECTED_VERSION \
              bash "${test_script}"
          done

      - name: Validate inputs
        run: bash scripts/validate-inputs.sh

      - name: Checkout kernel source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: ${{ inputs.source_repo }}
          ref: ${{ inputs.source_ref }}
          path: kernel-source
          fetch-depth: 1
          persist-credentials: false

      - name: Check runner disk space
        id: disk-space
        run: |
          available_gib="$(df --output=avail -BG / | tail -n1 | tr -dc '0-9')"
          echo "available_gib=${available_gib}" >> "$GITHUB_OUTPUT"
          if (( available_gib < 20 )); then
            echo "Only ${available_gib} GiB free; removing unused hosted-runner SDKs"
            sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
              /usr/local/share/boost /usr/share/swift || true
          else
            echo "${available_gib} GiB free; SDK cleanup not required"
          fi
          df -h /

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            bc bison build-essential ccache cpio curl flex git jq kmod libelf-dev \
            libncurses-dev libssl-dev lld llvm clang file python3 python-is-python3 \
            rsync unzip zip zstd

      - name: Restore Android kernel clang
        id: android-clang-cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: android-clang
          key: marble-builder-clang-v2-${{ runner.os }}-${{ runner.arch }}-clang-r416183b-b9dff4a2

      - name: Fetch and verify Android kernel clang
        run: |
          source config/marble.env
          if [[ -x "${ANDROID_CLANG_BIN}/clang" ]]; then
            "${ANDROID_CLANG_BIN}/clang" --version
            exit 0
          fi
          archive="$(mktemp)"
          curl --retry 5 --retry-delay 5 --retry-all-errors --connect-timeout 30 \
            -fsSL "${ANDROID_CLANG_ARCHIVE_URL}" -o "${archive}"
          echo "${ANDROID_CLANG_ARCHIVE_SHA256}  ${archive}" | sha256sum -c -
          mkdir -p "android-clang/${ANDROID_CLANG_VERSION}"
          tar -xzf "${archive}" -C "android-clang/${ANDROID_CLANG_VERSION}"
          rm -f "${archive}"
          test -x "${ANDROID_CLANG_BIN}/clang"
          "${ANDROID_CLANG_BIN}/clang" --version

      - name: Resolve refs
        run: bash scripts/resolve-refs.sh

      - name: Generate ccache key
        id: cache-context
        if: ${{ inputs.enable_ccache }}
        run: |
          source config/marble.env
          source release/resolved-refs.env
          config_hash="$(sha256sum scripts/build-kernel.sh config/marble.env config/managers.json \
            config/susfs-refs.json | sha256sum | cut -d' ' -f1)"
          prefix="marble-builder-ccache-v2-${RUNNER_OS}-${RUNNER_ARCH}-${ANDROID_CLANG_VERSION}-${source_commit}"
          manager_prefix="${prefix}-${MANAGER}"
          key="${manager_prefix}-${manager_commit:-none}-${susfs_commit:-none}-${BUILD_SCOPE}-${config_hash}"
          echo "key=${key}" >> "$GITHUB_OUTPUT"
          echo "prefix=${prefix}" >> "$GITHUB_OUTPUT"
          echo "manager_prefix=${manager_prefix}" >> "$GITHUB_OUTPUT"

      - name: Restore ccache
        id: ccache-restore
        if: ${{ inputs.enable_ccache }}
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ${{ steps.cache-context.outputs.key }}
          restore-keys: |
            ${{ steps.cache-context.outputs.manager_prefix }}-
            ${{ steps.cache-context.outputs.prefix }}-

      - name: Apply manager
        run: bash scripts/patch-manager.sh

      - name: Read manager version
        run: bash scripts/read-manager-version.sh

      - name: Apply SUSFS
        run: bash scripts/apply-susfs.sh

      - name: Build kernel
        run: bash scripts/build-kernel.sh

      - name: Package AnyKernel3 zip
        run: bash scripts/package-anykernel.sh

      - name: Copy metadata into release
        run: |
          cp release/resolved-refs.env kernel-source/release/resolved-refs.env
          {
            echo "source_repo=${SOURCE_REPO}"
            echo "source_ref=${SOURCE_REF}"
            echo "source_commit=$(git -C kernel-source rev-parse HEAD)"
            echo "workflow_run=${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
            echo "runner_image_os=${ImageOS:-unknown}"
            echo "runner_image_version=${ImageVersion:-unknown}"
            echo "android_clang_version=clang-r416183b"
            echo "android_clang_sha256=b9dff4a2df3d11a38c8e81ae259f1a1f5df083a9a30779dc5fa8f47a5602a3ef"
            echo "ccache_key=${{ steps.cache-context.outputs.key }}"
            echo "ccache_hit=${{ steps.ccache-restore.outputs.cache-hit || 'false' }}"
            echo "disk_available_before_build_gib=${{ steps.disk-space.outputs.available_gib }}"
            cat kernel-source/release/resolved-refs.env
          } > kernel-source/release/build-info.txt

      - name: Audit flashable zip
        run: bash scripts/audit-flashable-zip.sh

      - name: Generate build summary
        run: |
          bash scripts/generate-build-summary.sh
          cat kernel-source/release/summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Set artifact name
        id: artifact-name
        run: echo "name=marble-${{ inputs.artifact_label }}-${BUILD_SCOPE}-r${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"

      - name: Upload flashable artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ steps.artifact-name.outputs.name }}
          if-no-files-found: error
          retention-days: 30
          compression-level: 0
          path: |
            kernel-source/release/*.zip
            kernel-source/release/*.zip.sha256
            kernel-source/release/build-info.txt
            kernel-source/release/summary.md
            kernel-source/release/zip-audit.txt
            kernel-source/release/ccache-stats.txt
            kernel-source/release/zip-name.env

      - name: Upload debug artifacts
        if: ${{ !cancelled() && (inputs.debug_artifacts || failure()) }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: marble-debug-${{ inputs.artifact_label }}-${{ inputs.build_scope }}-r${{ github.run_number }}
          if-no-files-found: warn
          retention-days: 7
          compression-level: 0
          path: |
            kernel-source/release/Image
            kernel-source/release/System.map
            kernel-source/release/vmlinux
            kernel-source/release/dtbs.tar.gz
            kernel-source/release/modules.tar.gz
            kernel-source/release/build.log

      - name: Save ccache
        if: ${{ inputs.enable_ccache && success() && steps.ccache-restore.outputs.cache-hit != 'true' }}
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ${{ steps.cache-context.outputs.key }}

  release:
    needs: build
    if: ${{ inputs.make_release }}
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Download flashable artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ needs.build.outputs.flash_artifact_name }}
          path: release

      - name: Create draft release
        run: |
          source release/zip-name.env
          tag="marble-${{ inputs.artifact_label }}-r${GITHUB_RUN_NUMBER}"
          gh release create "${tag}" \
            release/*.zip \
            release/*.sha256 \
            release/build-info.txt \
            --draft \
            --title "${tag}" \
            --notes-file release/summary.md
