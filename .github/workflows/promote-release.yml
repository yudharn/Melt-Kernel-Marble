name: Promote Build to Draft Release

on:
  workflow_dispatch:
    inputs:
      build_run_id:
        description: Successful Build Marble Kernel run ID
        required: true
        type: string

permissions:
  contents: read

jobs:
  promote:
    name: Verify and create draft release
    runs-on: ubuntu-24.04
    environment: release-approval
    permissions:
      actions: read
      contents: write
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Validate target build run
        id: target
        env:
          BUILD_RUN_ID: ${{ inputs.build_run_id }}
        run: |
          if [[ "${GITHUB_REF}" != "refs/heads/main" ]]; then
            echo "::error::Release promotion must run from main"
            exit 1
          fi
          if [[ ! "${BUILD_RUN_ID}" =~ ^[0-9]+$ ]]; then
            echo "::error::Build run ID must contain digits only"
            exit 1
          fi

          run_json="$(gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${BUILD_RUN_ID}")"
          conclusion="$(jq -r '.conclusion' <<< "${run_json}")"
          head_branch="$(jq -r '.head_branch' <<< "${run_json}")"
          workflow_path="$(jq -r '.path' <<< "${run_json}")"
          event="$(jq -r '.event' <<< "${run_json}")"
          run_number="$(jq -r '.run_number' <<< "${run_json}")"
          head_sha="$(jq -r '.head_sha' <<< "${run_json}")"

          if [[ "${conclusion}" != "success" || "${head_branch}" != "main" || \
                "${workflow_path}" != ".github/workflows/build-matrix.yml" || \
                "${event}" != "workflow_dispatch" ]]; then
            echo "::error::Run must be a successful main-branch Build Marble Kernel dispatch"
            exit 1
          fi
          {
            echo "run_number=${run_number}"
            echo "head_sha=${head_sha}"
          } >> "${GITHUB_OUTPUT}"

      - name: Checkout promotion tooling
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Download target matrix artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: marble-flash-*-r${{ steps.target.outputs.run_number }}
          path: matrix-artifacts
          merge-multiple: false
          github-token: ${{ github.token }}
          repository: ${{ github.repository }}
          run-id: ${{ inputs.build_run_id }}

      - name: Verify artifacts and prepare release
        env:
          MATRIX_ARTIFACTS_DIR: matrix-artifacts
          MATRIX_SUMMARY: matrix-summary.md
          RELEASE_ASSETS_FILE: release-assets.txt
          SOURCE_RUN_NUMBER: ${{ steps.target.outputs.run_number }}
        run: bash scripts/prepare-promoted-release.sh

      - name: Create ZIP-only draft release
        env:
          TARGET_RUN_NUMBER: ${{ steps.target.outputs.run_number }}
          TARGET_HEAD_SHA: ${{ steps.target.outputs.head_sha }}
        run: |
          tag="marble-hyperos-r${TARGET_RUN_NUMBER}"
          if gh release view "${tag}" >/dev/null 2>&1; then
            echo "::error::Release ${tag} already exists"
            exit 1
          fi
          if gh api "repos/${GITHUB_REPOSITORY}/git/ref/tags/${tag}" >/dev/null 2>&1; then
            echo "::error::Tag ${tag} already exists"
            exit 1
          fi

          mapfile -t release_assets < release-assets.txt
          if [[ "${#release_assets[@]}" -eq 0 ]]; then
            echo "::error::No verified ZIP assets were prepared"
            exit 1
          fi

          gh release create "${tag}" "${release_assets[@]}" \
            --draft \
            --target "${TARGET_HEAD_SHA}" \
            --title "Marble Kernel · Stock HyperOS · r${TARGET_RUN_NUMBER}" \
            --notes-file matrix-summary.md
