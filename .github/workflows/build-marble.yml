name: Build Marble Kernel

on:
  workflow_dispatch:
    inputs:
      source_repo:
        description: Kernel source repository
        required: true
        default: mohdakil2426/android_kernel_xiaomi_marble
      source_ref:
        description: Kernel source branch, tag, or commit
        required: true
        default: melt-rebase
      manager:
        description: Kernel manager
        required: true
        type: choice
        default: none
        options:
          - none
          - kernelsu
          - kernelsu-next
          - sukisu-ultra
          - resukisu
      manager_ref:
        description: Manager branch, tag, or commit override
        required: false
        default: ""
      enable_susfs:
        description: Apply SUSFS patches
        required: true
        type: boolean
        default: false
      susfs_version:
        description: SUSFS preset version
        required: true
        type: choice
        default: v2.2.0
        options:
          - v2.2.0
          - v2.1.0
          - custom
      susfs_kernel_branch:
        description: SUSFS kernel patch family
        required: true
        default: gki-android12-5.10
      susfs_ref:
        description: SUSFS branch, tag, or commit for custom version
        required: false
        default: ""
      susfs_expected_version:
        description: Optional SUSFS_VERSION guard for custom refs
        required: false
        default: ""
      build_scope:
        description: Build target set
        required: true
        type: choice
        default: image-only
        options:
          - image-only
          - full
      enable_ccache:
        description: Enable ccache
        required: true
        type: boolean
        default: true
      make_release:
        description: Create draft GitHub release
        required: true
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  build:
    permissions:
      contents: write
    uses: ./.github/workflows/build-core.yml
    with:
      source_repo: ${{ inputs.source_repo }}
      source_ref: ${{ inputs.source_ref }}
      manager: ${{ inputs.manager }}
      manager_ref: ${{ inputs.manager_ref }}
      enable_susfs: ${{ inputs.enable_susfs }}
      susfs_version: ${{ inputs.susfs_version }}
      susfs_kernel_branch: ${{ inputs.susfs_kernel_branch }}
      susfs_ref: ${{ inputs.susfs_ref }}
      susfs_expected_version: ${{ inputs.susfs_expected_version }}
      build_scope: ${{ inputs.build_scope }}
      enable_ccache: ${{ inputs.enable_ccache }}
      make_release: ${{ inputs.make_release }}
      artifact_label: ${{ inputs.manager }}${{ inputs.enable_susfs && '-susfs' || '' }}
      run_policy_tests: true
      publish_step_summary: true
