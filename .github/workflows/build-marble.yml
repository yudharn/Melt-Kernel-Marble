name: Build Marble Kernel

on:
  workflow_dispatch:
    inputs:
      source_repo:
        description: Kernel source repository
        required: true
        default: mohdakil2426/android_kernel_xiaomi_marble
      source_ref:
        description: Kernel source branch, tag, or commit
        required: true
        default: melt-rebase
      manager:
        description: Kernel manager
        required: true
        type: choice
        default: none
        options:
          - none
          - kernelsu
          - kernelsu-next
          - sukisu-ultra
          - resukisu
      manager_ref:
        description: Manager branch, tag, or commit override
        required: false
        default: ""
      enable_susfs:
        description: Apply SUSFS patches
        required: true
        type: boolean
        default: false
      susfs_version:
        description: SUSFS preset version
        required: true
        type: choice
        default: v2.2.0
        options:
          - v2.2.0
          - v2.1.0
          - custom
      susfs_kernel_branch:
        description: SUSFS kernel patch family
        required: true
        default: gki-android12-5.10
      susfs_ref:
        description: SUSFS branch, tag, or commit for custom version
        required: false
        default: ""
      susfs_expected_version:
        description: Optional SUSFS_VERSION guard for custom refs
        required: false
        default: ""
      build_scope:
        description: Build target set
        required: true
        type: choice
        default: image-only
        options:
          - image-only
          - full
      enable_ccache:
        description: Enable ccache
        required: true
        type: boolean
        default: true
      debug_artifacts:
        description: Upload debug artifacts on successful builds
        required: true
        type: boolean
        default: false
      make_release:
        description: Create draft GitHub release
        required: true
        type: boolean
        default: false

permissions:
  actions: read
  contents: write

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    env:
      GH_TOKEN: ${{ github.token }}
      SOURCE_REPO: ${{ inputs.source_repo }}
      SOURCE_REF: ${{ inputs.source_ref }}
      MANAGER: ${{ inputs.manager }}
      MANAGER_REF: ${{ inputs.manager_ref }}
      ENABLE_SUSFS: ${{ inputs.enable_susfs }}
      SUSFS_VERSION: ${{ inputs.susfs_version }}
      SUSFS_KERNEL_BRANCH: ${{ inputs.susfs_kernel_branch }}
      SUSFS_REF: ${{ inputs.susfs_ref }}
      SUSFS_EXPECTED_VERSION: ${{ inputs.susfs_expected_version }}
      BUILD_SCOPE: ${{ inputs.build_scope }}
      KERNEL_DIR: kernel-source
      CCACHE_DIR: /home/runner/.ccache
      ANDROID_CLANG_BIN: ${{ github.workspace }}/android-clang/clang-r416183b/bin

    steps:
      - name: Checkout builder
        uses: actions/checkout@v4
        with:
          path: builder

      - name: Prepare builder workspace
        run: rsync -a builder/ ./

      - name: Validate builder policy
        run: |
          for test_script in tests/test-*.sh; do
            bash "${test_script}"
          done

      - name: Validate inputs
        run: bash scripts/validate-inputs.sh

      - name: Checkout kernel source
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.source_repo }}
          ref: ${{ inputs.source_ref }}
          path: kernel-source
          fetch-depth: 1

      - name: Free runner disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/share/boost /usr/share/swift || true
          df -h

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            bc bison build-essential ccache cpio curl flex git jq kmod libelf-dev \
            libncurses-dev libssl-dev lld llvm clang file python3 python-is-python3 \
            rsync unzip zip zstd

      - name: Restore Android kernel clang
        id: android-clang-cache
        uses: actions/cache@v4
        with:
          path: android-clang
          key: marble-builder-android-clang-clang-r416183b

      - name: Fetch Android kernel clang
        run: |
          source config/marble.env
          if [[ -x "${ANDROID_CLANG_BIN}/clang" ]]; then
            "${ANDROID_CLANG_BIN}/clang" --version
            exit 0
          fi
          mkdir -p "android-clang/${ANDROID_CLANG_VERSION}"
          curl -fsSL "${ANDROID_CLANG_ARCHIVE_URL}" | tar -xz -C "android-clang/${ANDROID_CLANG_VERSION}"
          test -x "${ANDROID_CLANG_BIN}/clang"
          "${ANDROID_CLANG_BIN}/clang" --version

      - name: Restore ccache
        id: ccache-restore
        if: ${{ inputs.enable_ccache }}
        uses: actions/cache/restore@v4
        with:
          path: ${{ env.CCACHE_DIR }}
          key: marble-builder-ccache-${{ runner.os }}-${{ inputs.source_ref }}-${{ inputs.manager }}-${{ inputs.manager_ref }}-${{ inputs.enable_susfs }}-${{ inputs.susfs_version }}-${{ inputs.build_scope }}
          restore-keys: |
            marble-builder-ccache-${{ runner.os }}-${{ inputs.source_ref }}-${{ inputs.manager }}-
            marble-builder-ccache-${{ runner.os }}-${{ inputs.source_ref }}-
            marble-builder-ccache-${{ runner.os }}-

      - name: Resolve refs
        run: bash scripts/resolve-refs.sh

      - name: Apply manager
        run: bash scripts/patch-manager.sh

      - name: Apply manager compatibility
        run: bash scripts/apply-manager-compat.sh

      - name: Apply SUSFS
        run: bash scripts/apply-susfs.sh

      - name: Build kernel
        run: bash scripts/build-kernel.sh

      - name: Package AnyKernel3 zip
        run: bash scripts/package-anykernel.sh

      - name: Copy metadata into release
        run: |
          cp release/resolved-refs.env kernel-source/release/resolved-refs.env
          {
            echo "source_repo=${SOURCE_REPO}"
            echo "source_ref=${SOURCE_REF}"
            echo "source_commit=$(git -C kernel-source rev-parse HEAD)"
            echo "workflow_run=${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
            cat kernel-source/release/resolved-refs.env
          } > kernel-source/release/build-info.txt

      - name: Audit flashable zip
        run: bash scripts/audit-flashable-zip.sh

      - name: Generate build summary
        run: |
          bash scripts/generate-build-summary.sh
          cat kernel-source/release/summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload flashable artifact
        uses: actions/upload-artifact@v4
        with:
          name: marble-flashable-${{ inputs.manager }}${{ inputs.enable_susfs && '-susfs' || '' }}-${{ inputs.build_scope }}-${{ github.run_number }}
          if-no-files-found: error
          path: |
            kernel-source/release/*.zip
            kernel-source/release/*.zip.sha256
            kernel-source/release/build-info.txt
            kernel-source/release/summary.md
            kernel-source/release/zip-audit.txt
            kernel-source/release/ccache-stats.txt

      - name: Upload debug artifacts
        if: ${{ !cancelled() && (inputs.debug_artifacts || failure()) }}
        uses: actions/upload-artifact@v4
        with:
          name: marble-debug-${{ inputs.manager }}${{ inputs.enable_susfs && '-susfs' || '' }}-${{ inputs.build_scope }}-${{ github.run_number }}
          if-no-files-found: warn
          path: |
            kernel-source/release/Image
            kernel-source/release/System.map
            kernel-source/release/vmlinux
            kernel-source/release/dtbs.tar.gz
            kernel-source/release/modules.tar.gz
            kernel-source/release/build.log

      - name: Save ccache
        if: ${{ inputs.enable_ccache && success() && steps.ccache-restore.outputs.cache-hit != 'true' }}
        uses: actions/cache/save@v4
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ${{ steps.ccache-restore.outputs.cache-primary-key }}

      - name: Create draft release
        if: ${{ inputs.make_release && success() }}
        run: |
          source kernel-source/release/zip-name.env
          suffix="${MANAGER}"
          if [[ "${ENABLE_SUSFS}" == "true" ]]; then
            suffix="${suffix}-susfs"
          fi
          tag="marble-${suffix}-${GITHUB_RUN_NUMBER}"
          gh release create "${tag}" kernel-source/release/*.zip kernel-source/release/*.sha256 kernel-source/release/build-info.txt \
            --draft \
            --title "${tag}" \
            --notes-file kernel-source/release/summary.md
