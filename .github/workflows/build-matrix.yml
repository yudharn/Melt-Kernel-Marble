name: Build Marble Kernel

on:
  workflow_dispatch:
    inputs:
      build_none:
        description: "Build: none (baseline no-root)"
        type: boolean
        default: false
      build_kernelsu:
        description: "Build: KernelSU (no SUSFS)"
        type: boolean
        default: false
      build_kernelsu_next:
        description: "Build: KernelSU-Next"
        type: boolean
        default: false
      build_sukisu_ultra:
        description: "Build: SukiSU Ultra"
        type: boolean
        default: false
      build_resukisu:
        description: "Build: ReSukiSU"
        type: boolean
        default: false
      enable_susfs:
        description: "Enable SUSFS (applies to KSUNext, SukiSU Ultra, ReSukiSU)"
        type: boolean
        default: false
      susfs_version:
        description: SUSFS preset version
        type: choice
        default: v2.2.0
        options:
          - v2.2.0
          - v2.1.0
          - custom
      susfs_ref:
        description: "SUSFS branch/tag/commit (only for custom version)"
        required: false
        default: ""
      source_repo:
        description: Kernel source repository
        required: true
        default: yudharn/android_kernel_xiaomi_marble
      source_ref:
        description: Kernel source branch, tag, or commit
        required: true
        default: melt-rebase
      build_scope:
        description: Build target set
        type: choice
        default: image-only
        options:
          - image-only
          - full
      toolchain:
        description: Compiler toolchain
        type: choice
        default: android-r416183b
        options:
          - android-r416183b
          - llvm-22.1.8
      enable_ccache:
        description: Enable ccache
        type: boolean
        default: true
      create_draft_release:
        description: Create a draft GitHub release when the build succeeds
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ inputs.enable_susfs }}-${{ inputs.build_scope }}
  cancel-in-progress: false

jobs:
  setup:
    name: Generate matrix and validate policy
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    outputs:
      matrix: ${{ steps.gen.outputs.matrix }}
    steps:
      - name: Checkout builder
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Validate builder policy
        run: |
          for test_script in tests/test-*.sh; do
            env -u SOURCE_REPO -u SOURCE_REF -u MANAGER -u MANAGER_REF -u ENABLE_SUSFS \
              -u SUSFS_VERSION -u SUSFS_KERNEL_BRANCH -u SUSFS_REF -u SUSFS_EXPECTED_VERSION \
              bash "${test_script}"
          done

      - name: Generate build matrix
        id: gen
        env:
          BUILD_NONE: ${{ inputs.build_none }}
          BUILD_KERNELSU: ${{ inputs.build_kernelsu }}
          BUILD_KERNELSU_NEXT: ${{ inputs.build_kernelsu_next }}
          BUILD_SUKISU_ULTRA: ${{ inputs.build_sukisu_ultra }}
          BUILD_RESUKISU: ${{ inputs.build_resukisu }}
          ENABLE_SUSFS: ${{ inputs.enable_susfs }}
        run: |
          matrix="$(bash scripts/generate-build-matrix.sh)"
          echo "Generated matrix: ${matrix}"

  build:
    name: ${{ matrix.label }}
    needs: setup
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.setup.outputs.matrix) }}
    permissions:
      contents: read
      id-token: write
      attestations: write
    uses: ./.github/workflows/build-core.yml
    with:
      source_repo: ${{ inputs.source_repo }}
      source_ref: ${{ inputs.source_ref }}
      manager: ${{ matrix.manager }}
      manager_ref: ""
      enable_susfs: ${{ fromJSON(matrix.enable_susfs) }}
      susfs_version: ${{ inputs.susfs_version }}
      susfs_kernel_branch: gki-android12-5.10
      susfs_ref: ${{ inputs.susfs_ref }}
      susfs_expected_version: ""
      build_scope: ${{ inputs.build_scope }}
      toolchain: ${{ inputs.toolchain }}
      enable_ccache: ${{ inputs.enable_ccache }}
      artifact_label: ${{ matrix.label }}
      run_policy_tests: false
      publish_step_summary: false

  aggregate-summary:
    name: Generate combined matrix summary
    needs: build
    if: ${{ always() }}
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      actions: read
    steps:
      - name: Checkout builder
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Download matrix flash artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: marble-flash-*-r${{ github.run_number }}
          path: matrix-artifacts
          merge-multiple: false

      - name: Generate combined matrix summary
        env:
          BUILD_SCOPE: ${{ inputs.build_scope }}
          MATRIX_ARTIFACTS_DIR: matrix-artifacts
          MATRIX_SUMMARY: matrix-summary.md
        run: |
          bash scripts/generate-matrix-summary.sh
          cat matrix-summary.md >> "$GITHUB_STEP_SUMMARY"

  release:
    name: Create ZIP-only draft release
    needs: [build, aggregate-summary]
    if: ${{ inputs.create_draft_release == true && needs.build.result == 'success' && needs.aggregate-summary.result == 'success' }}
    runs-on: ubuntu-24.04
    permissions:
      actions: read
      contents: write
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout builder
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Download matrix flash artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: marble-flash-*-r${{ github.run_number }}
          path: matrix-artifacts
          merge-multiple: false

      - name: Verify artifacts and prepare release
        env:
          BUILD_SCOPE: ${{ inputs.build_scope }}
          MATRIX_ARTIFACTS_DIR: matrix-artifacts
          MATRIX_SUMMARY: matrix-summary.md
          RELEASE_ASSETS_FILE: release-assets.txt
          SOURCE_RUN_NUMBER: ${{ github.run_number }}
        run: bash scripts/prepare-promoted-release.sh

      - name: Create ZIP-only draft release
        run: |
          tag="marble-hyperos-r${GITHUB_RUN_NUMBER}"
          if gh release view "${tag}" >/dev/null 2>&1; then
            echo "::error::Release ${tag} already exists"
            exit 1
          fi
          if gh api "repos/${GITHUB_REPOSITORY}/git/ref/tags/${tag}" >/dev/null 2>&1; then
            echo "::error::Tag ${tag} already exists"
            exit 1
          fi

          mapfile -t release_assets < release-assets.txt
          if [[ "${#release_assets[@]}" -eq 0 ]]; then
            echo "::error::No verified ZIP assets were prepared"
            exit 1
          fi

          gh release create "${tag}" "${release_assets[@]}" \
            --draft \
            --target "${GITHUB_SHA}" \
            --title "Marble Kernel · Stock HyperOS · r${GITHUB_RUN_NUMBER}" \
            --notes-file matrix-summary.md
